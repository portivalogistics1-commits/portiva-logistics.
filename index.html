<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portiva Logistics</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{margin:0;font-family:Arial;direction:rtl;background:#f4f6f9}

/* NAV */
header{
position:fixed;
width:100%;
background:rgba(0,0,0,0.7);
color:#fff;
padding:15px 30px;
display:flex;
justify-content:space-between;
z-index:1000;
}

nav a{color:#fff;margin:0 15px;text-decoration:none}

/* HERO */
.hero{
height:100vh;
background:url('ship.jpg') center/cover;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:#fff;
position:relative;
}

.hero::after{
content:"";
position:absolute;
width:100%;height:100%;
background:rgba(0,0,0,0.7);
}

.hero-content{
position:relative;
z-index:2;
}

.hero img{
width:260px;
animation:rotate 12s linear infinite;
}

@keyframes rotate{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

.hero h1{font-size:45px;margin:10px 0}

/* SECTION */
.section{padding:80px 20px;text-align:center}

/* SERVICES */
.services{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

.service{
background:#fff;
padding:30px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
transition:.3s;
cursor:pointer;
}

.service:hover{transform:translateY(-10px)}

.service i{
font-size:45px;
color:#0b3d91;
}

/* GALLERY */
.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:10px;
}

.gallery img{
width:100%;
height:250px;
object-fit:cover;
}

/* FORM */
input,select,textarea{
width:90%;
padding:12px;
margin:10px;
border:1px solid #ccc;
border-radius:5px;
}

button{
background:#ff7a00;
color:#fff;
padding:12px 25px;
border:none;
cursor:pointer;
}

/* WHATSAPP */
.whatsapp{
position:fixed;
bottom:20px;
left:20px;
background:#25D366;
color:#fff;
padding:15px;
border-radius:50%;
}
</style>
</head>

<body>

<header>
<h2>Portiva</h2>
<nav>
<a href="#services">الخدمات</a>
<a href="#work">أعمالنا</a>
<a href="#quote">عرض سعر</a>
</nav>
</header>

<!-- HERO -->
<section class="hero">
<div class="hero-content">
<img src="logo.png.png">
<h1>Portiva Logistics</h1>
<p>التخليص الجمركي - نقل الحاويات - خدمات الموانئ</p>
</div>
</section>

<!-- SERVICES -->
<section class="section" id="services">
<h2>خدماتنا</h2>

<div class="services">

<div class="service">
<i class="fas fa-file-invoice"></i>
<h3>التخليص الجمركي</h3>
<p>إنهاء جميع الإجراءات بسرعة ودقة</p>
</div>

<div class="service">
<i class="fas fa-truck"></i>
<h3>نقل الحاويات</h3>
<p>نقل لجميع المحافظات بأمان</p>
</div>

<div class="service">
<i class="fas fa-ship"></i>
<h3>خدمات الميناء</h3>
<p>متابعة داخل الميناء حتى التسليم</p>
</div>

</div>
</section>

<!-- GALLERY -->
<section class="section" id="work">
<h2>أعمالنا</h2>

<div class="gallery">
<img src="ship.jpg">
<img src="yard.jpg">
<img src="truck.jpg">
<img src="worker.jpg">
</div>
</section>

<!-- QUOTE -->
<section class="section" id="quote">
<h2>طلب عرض سعر</h2>

<input id="name" placeholder="الاسم">
<input id="phone" placeholder="رقم الهاتف">

<select id="type">
<option>20 قدم</option>
<option>40 قدم</option>
</select>

<input id="count" placeholder="عدد الحاويات">

<button onclick="send()">إرسال واتساب</button>
</section>

<a class="whatsapp" href="https://wa.me/201204646350">💬</a>

<script>
function send(){
let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let type=document.getElementById("type").value;
let count=document.getElementById("count").value;

let msg=`طلب عرض سعر:
${name}
${phone}
${type}
عدد: ${count}`;

window.open("https://wa.me/201204646350?text="+encodeURIComponent(msg));
}
</script>

</body>
</html>
