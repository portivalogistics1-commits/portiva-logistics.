<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portiva Logistics</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
margin:0;
font-family:Arial;
direction:rtl;
background:#0a1f3c;
color:#fff;
}

/* NAV */
header{
position:fixed;
width:100%;
top:0;
background:rgba(0,0,0,0.6);
display:flex;
justify-content:space-between;
padding:15px 40px;
z-index:1000;
}

nav a{
color:#fff;
margin:0 15px;
text-decoration:none;
}

/* HERO */
.hero{
height:100vh;
background:linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.7)),
url('img1.jpg');
background-size:cover;
background-position:center;
display:flex;
align-items:center;
justify-content:space-between;
padding:100px 60px;
}

.hero-text{
max-width:500px;
}

.hero-text h1{
font-size:50px;
margin-bottom:10px;
}

.hero-text p{
margin-bottom:20px;
}

.btn{
background:#0b5ed7;
padding:12px 25px;
border-radius:25px;
text-decoration:none;
color:#fff;
}

/* LOGO */
.logo{
width:200px;
animation:spin 25s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0)}
100%{transform:rotate(360deg)}
}

/* SERVICES */
.services{
background:#0b2a50;
padding:50px;
display:flex;
justify-content:space-around;
flex-wrap:wrap;
}

.card{
background:#102f5c;
padding:20px;
width:200px;
margin:10px;
border-radius:10px;
text-align:center;
}

.card i{
font-size:35px;
margin-bottom:10px;
}

/* GALLERY */
.gallery{
padding:40px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
}

.gallery img{
width:100%;
height:200px;
object-fit:cover;
border-radius:10px;
}

/* FORM */
.form{
background:#0b2a50;
padding:40px;
text-align:center;
}

input,select{
width:250px;
padding:10px;
margin:10px;
border:none;
border-radius:5px;
}

button{
padding:12px 25px;
background:#0b5ed7;
color:#fff;
border:none;
border-radius:20px;
cursor:pointer;
}

/* WHATS */
.whatsapp{
position:fixed;
bottom:20px;
left:20px;
background:#25D366;
padding:15px;
border-radius:50%;
color:#fff;
font-size:20px;
}

/* FOOTER */
footer{
text-align:center;
padding:20px;
background:#000;
}
</style>
</head>

<body>

<header>
<div>PORTIVA</div>
<nav>
<a href="#">الرئيسية</a>
<a href="#services">خدماتنا</a>
<a href="#gallery">أعمالنا</a>
<a href="#form">عرض سعر</a>
</nav>
</header>

<section class="hero">
<div class="hero-text">
<h1>PORTIVA LOGISTICS</h1>
<p>التخليص الجمركي والنقل من جميع الموانئ</p>
<a class="btn" href="https://wa.me/201204646350">تواصل معنا</a>
</div>

<img src="logo.png.png" class="logo">
</section>

<section class="services" id="services">
<div class="card">
<i class="fa-solid fa-ship"></i>
<h3>التخليص الجمركي</h3>
</div>

<div class="card">
<i class="fa-solid fa-truck"></i>
<h3>نقل الحاويات</h3>
</div>

<div class="card">
<i class="fa-solid fa-warehouse"></i>
<h3>خدمات الميناء</h3>
</div>

<div class="card">
<i class="fa-solid fa-box"></i>
<h3>إدارة الشحنات</h3>
</div>
</section>

<section class="gallery" id="gallery">
<img src="img1.jpg">
<img src="img2.jpg">
<img src="img3.jpg">
<img src="img4.jpg">
<img src="img5.jpg">
<img src="img6.jpg">
<img src="img7.jpg">
</section>

<section class="form" id="form">
<h2>طلب عرض سعر</h2>

<input id="name" placeholder="الاسم">
<input id="phone" placeholder="رقم الهاتف">

<select id="container">
<option>نوع الحاوية</option>
<option>20 قدم</option>
<option>40 قدم</option>
</select>

<input id="count" placeholder="عدد الحاويات">

<button onclick="send()">إرسال واتساب</button>
</section>

<a class="whatsapp" href="https://wa.me/201204646350">💬</a>

<footer>
© Portiva Logistics
</footer>

<script>
function send(){
let name = document.getElementById("name").value;
let phone = document.getElementById("phone").value;
let container = document.getElementById("container").value;
let count = document.getElementById("count").value;

let msg = `طلب تخليص:
الاسم: ${name}
رقم الهاتف: ${phone}
نوع الحاوية: ${container}
عدد الحاويات: ${count}`;

window.open("https://wa.me/201204646350?text=" + encodeURIComponent(msg));
}
</script>

</body>
</html>
