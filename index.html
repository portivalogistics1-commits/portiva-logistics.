<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portiva Logistics</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
margin:0;
font-family:Tajawal, Arial;
direction:rtl;
background:#0b1f3a;
color:#fff;
}

/* NAV */
header{
position:absolute;
top:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 50px;
z-index:10;
}

nav a{
color:#fff;
margin:0 15px;
text-decoration:none;
font-size:15px;
}

.contact-btn{
border:1px solid #fff;
padding:8px 18px;
border-radius:20px;
}

/* HERO */
.hero{
height:100vh;
background:linear-gradient(rgba(0,0,0,0.4),rgba(0,0,0,0.7)), url('hero.jpg');
background-size:cover;
background-position:center;
display:flex;
align-items:center;
justify-content:space-between;
padding:100px 80px;
}

.hero-text{
max-width:500px;
}

.hero-text h1{
font-size:55px;
margin:0;
}

.hero-text p{
margin:15px 0;
font-size:18px;
}

.btn{
background:#0b5ed7;
padding:12px 25px;
border-radius:25px;
text-decoration:none;
color:#fff;
display:inline-block;
}

/* LOGO */
.logo{
width:300px;
}

/* SERVICES */
.services{
background:#0c2d57;
margin-top:-80px;
padding:30px;
display:flex;
justify-content:space-around;
border-radius:20px;
width:90%;
margin-left:auto;
margin-right:auto;
}

.card{
text-align:center;
width:200px;
}

.card i{
font-size:35px;
margin-bottom:10px;
}

/* GALLERY */
.gallery{
padding:40px;
background:#fff;
color:#000;
text-align:center;
}

.gallery h2{
margin-bottom:20px;
}

.images{
display:flex;
gap:10px;
overflow:auto;
}

.images img{
width:200px;
height:120px;
object-fit:cover;
border-radius:10px;
}

/* FORM */
.form{
background:#0b1f3a;
padding:30px;
text-align:center;
}

input,select{
padding:10px;
margin:10px;
border:none;
border-radius:5px;
width:180px;
}

button{
padding:10px 25px;
background:#0b5ed7;
color:#fff;
border:none;
border-radius:20px;
}

/* FOOTER */
footer{
text-align:center;
padding:15px;
background:#000;
}
</style>
</head>

<body>

<header>
<div class="contact-btn">تواصل معنا</div>

<nav>
<a href="#">الرئيسية</a>
<a href="#">خدماتنا</a>
<a href="#">أعمالنا</a>
<a href="#">طلب عرض سعر</a>
<a href="#">من نحن</a>
</nav>

<div>PORTIVA</div>
</header>

<section class="hero">

<div class="hero-text">
<h1>PORTIVA LOGISTICS</h1>
<p>التخليص الجمركي والنقل من جميع الموانئ<br>بسرعة - أمان - احترافية</p>
<a class="btn" href="https://wa.me/201204646350">تواصل معنا الآن</a>
</div>

<img src="logo.png.png" class="logo">

</section>

<section class="services">
<div class="card"><i class="fa-solid fa-ship"></i><p>التخليص الجمركي</p></div>
<div class="card"><i class="fa-solid fa-truck"></i><p>نقل الحاويات</p></div>
<div class="card"><i class="fa-solid fa-warehouse"></i><p>خدمات الميناء</p></div>
<div class="card"><i class="fa-solid fa-box"></i><p>إدارة الشحنات</p></div>
</section>

<section class="gallery">
<h2>أعمالنا من أرض الواقع</h2>
<div class="images">
<img src="img1.jpg">
<img src="img2.jpg">
<img src="img3.jpg">
<img src="img4.jpg">
<img src="img5.jpg">
<img src="img6.jpg">
<img src="img7.jpg">
</div>
</section>

<section class="form">
<h2>طلب عرض سعر</h2>
<input id="name" placeholder="الاسم">
<input id="phone" placeholder="رقم الهاتف">
<select id="type">
<option>نوع الحاوية</option>
<option>20 قدم</option>
<option>40 قدم</option>
</select>
<input id="count" placeholder="عدد الحاويات">
<br>
<button onclick="send()">إرسال</button>
</section>

<footer>
© Portiva Logistics
</footer>

<script>
function send(){
let msg = "طلب عرض سعر";
window.open("https://wa.me/201204646350?text="+msg);
}
</script>

</body>
</html>
