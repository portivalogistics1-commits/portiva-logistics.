<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portiva Logistics</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
body{margin:0;font-family:Arial;direction:rtl;background:#f4f6f9}

/* NAV */
header{
background:#0b3d91;
color:#fff;
padding:15px 30px;
display:flex;
justify-content:space-between;
}

nav a{color:#fff;margin:0 10px;text-decoration:none}

/* HERO */
.hero{
background:#0b3d91;
color:#fff;
text-align:center;
padding:120px 20px;
position:relative;
}

.hero img{width:200px}

/* SECTION */
.section{padding:60px 20px;text-align:center}

/* SERVICES */
.services{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.service{
background:#fff;
padding:25px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
cursor:pointer;
transition:.3s;
}

.service:hover{transform:translateY(-10px)}

.service i{
font-size:40px;
color:#0b3d91;
margin-bottom:10px;
}

/* POPUP */
.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
justify-content:center;
align-items:center;
}

.popup-content{
background:#fff;
padding:30px;
width:90%;
max-width:500px;
border-radius:10px;
position:relative;
text-align:right;
}

.popup-content span{
position:absolute;
top:10px;
left:15px;
font-size:25px;
cursor:pointer;
}

/* WHATSAPP */
.whatsapp{
position:fixed;
bottom:20px;
left:20px;
background:#25D366;
color:#fff;
padding:15px;
border-radius:50%;
text-decoration:none;
}
</style>
</head>

<body>

<header>
<h2>Portiva</h2>
<nav>
<a href="#">الرئيسية</a>
<a href="#services">الخدمات</a>
</nav>
</header>

<section class="hero">
<img src="logo.png.png">
<h1>Portiva Logistics</h1>
<p>التخليص الجمركي والنقل</p>
</section>

<section class="section" id="services">
<h2>خدماتنا</h2>

<div class="services">

<div class="service" onclick="openBox('customs')">
<i class="fas fa-file-invoice"></i>
<h3>التخليص الجمركي</h3>
</div>

<div class="service" onclick="openBox('transport')">
<i class="fas fa-truck"></i>
<h3>نقل الحاويات</h3>
</div>

<div class="service" onclick="openBox('port')">
<i class="fas fa-ship"></i>
<h3>خدمات الميناء</h3>
</div>

</div>
</section>

<!-- POPUP -->
<div id="popup" class="popup">
<div class="popup-content">
<span onclick="closeBox()">×</span>
<div id="popupText"></div>
<a id="whatsappBtn" target="_blank">اطلب الخدمة</a>
</div>
</div>

<a class="whatsapp" href="https://wa.me/201204646350">💬</a>

<script>
function openBox(type){
let text="";
let msg="";

if(type=="customs"){
text=`
<h3>التخليص الجمركي</h3>
<p>إنهاء جميع الإجراءات الجمركية بسرعة.</p>
<p>✔ تخليص 20 و40 قدم</p>
<p>✔ استيراد وتصدير</p>`;
msg="عاوز تخليص جمركي";
}

if(type=="transport"){
text=`
<h3>نقل الحاويات</h3>
<p>نقل آمن وسريع للحاويات.</p>
<p>✔ تريلات</p>
<p>✔ جميع المحافظات</p>`;
msg="عاوز نقل حاويات";
}

if(type=="port"){
text=`
<h3>خدمات الميناء</h3>
<p>متابعة كاملة داخل الميناء.</p>
<p>✔ إنهاء الإجراءات</p>
<p>✔ تسليم سريع</p>`;
msg="عاوز خدمات ميناء";
}

document.getElementById("popupText").innerHTML=text;
document.getElementById("popup").style.display="flex";
document.getElementById("whatsappBtn").href="https://wa.me/201204646350?text="+encodeURIComponent(msg);
}

function closeBox(){
document.getElementById("popup").style.display="none";
}
</script>

</body>
</html>
