<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portiva Logistics</title>

<!-- Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{margin:0;font-family:Arial;direction:rtl;background:#f4f6f9}

/* NAV */
header{
background:#0b3d91;
color:#fff;
padding:15px 20px;
display:flex;
justify-content:space-between;
}

nav a{color:#fff;margin:0 10px;text-decoration:none}

/* HERO */
.hero{
background:#0b3d91;
color:#fff;
text-align:center;
padding:100px 20px;
}

.hero img{width:180px}

/* SERVICES */
.section{padding:50px;text-align:center}

.services{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.service{
background:#fff;
padding:25px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
cursor:pointer;
transition:.3s;
}

.service:hover{transform:translateY(-10px)}

.icon{
font-size:40px;
margin-bottom:10px;
}

/* GALLERY */
.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:10px;
}

.gallery img{
width:100%;
height:200px;
object-fit:cover;
border-radius:8px;
}

/* POPUP */
.popup{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.7);
justify-content:center;
align-items:center;
}

.popup-content{
background:#fff;
padding:25px;
width:90%;
max-width:400px;
border-radius:10px;
position:relative;
}

.close{
position:absolute;
left:10px;
top:10px;
font-size:20px;
cursor:pointer;
}

/* WHATSAPP */
.whatsapp{
position:fixed;
bottom:20px;
left:20px;
background:#25D366;
color:#fff;
padding:15px;
border-radius:50%;
text-decoration:none;
}
</style>
</head>

<body>

<header>
<h3>Portiva</h3>
<nav>
<a href="#">الرئيسية</a>
<a href="#services">الخدمات</a>
</nav>
</header>

<section class="hero">
<img src="logo.png.png">
<h1>Portiva Logistics</h1>
<p>التخليص الجمركي والنقل</p>
</section>

<section class="section" id="services">
<h2>خدماتنا</h2>

<div class="services">

<div class="service" onclick="openBox('customs')">
<div class="icon">📄</div>
<h3>التخليص الجمركي</h3>
</div>

<div class="service" onclick="openBox('transport')">
<div class="icon">🚚</div>
<h3>نقل الحاويات</h3>
</div>

<div class="service" onclick="openBox('port')">
<div class="icon">🚢</div>
<h3>خدمات الميناء</h3>
</div>

</div>
</section>

<section class="section">
<h2>أعمالنا</h2>

<div class="gallery">
<img src="https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d">
<img src="https://images.unsplash.com/photo-1566576721346-d4a3b4eaeb55">
<img src="https://images.unsplash.com/photo-1509395176047-4a66953fd231">
<img src="https://images.unsplash.com/photo-1578574577315-3fbeb0cecdc2">
</div>

</section>

<!-- POPUP -->
<div id="popup" class="popup">
<div class="popup-content">
<div class="close" onclick="closeBox()">✖</div>
<div id="popupText"></div>
</div>
</div>

<a class="whatsapp" href="https://wa.me/201204646350">💬</a>

<script>
function openBox(type){
let content="";

if(type=="customs"){
content="<h3>التخليص الجمركي</h3><p>إنهاء جميع الإجراءات بسرعة واحترافية</p>";
}

if(type=="transport"){
content="<h3>نقل الحاويات</h3><p>نقل آمن لجميع المحافظات</p>";
}

if(type=="port"){
content="<h3>خدمات الميناء</h3><p>متابعة الشحنات داخل الميناء</p>";
}

document.getElementById("popupText").innerHTML=content;
document.getElementById("popup").style.display="flex";
}

function closeBox(){
document.getElementById("popup").style.display="none";
}
</script>

</body>
</html>
