<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portiva Logistics</title>

<!-- ICONS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
margin:0;
font-family:Arial;
direction:rtl;
background:#f4f6f9;
}

/* NAV */
header {
background:#0b3d91;
color:#fff;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

nav a {
color:white;
margin:0 10px;
text-decoration:none;
font-weight:bold;
}

/* HERO */
.hero {
height:100vh;
background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
url('https://images.unsplash.com/photo-1566576721346-d4a3b4eaeb55');
background-size:cover;
background-position:center;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
color:#fff;
}

.hero img {
width:220px;
margin-bottom:20px;
animation:spin 25s linear infinite;
}

@keyframes spin {
0% {transform:rotate(0deg);}
100% {transform:rotate(360deg);}
}

.hero h1 {
font-size:40px;
margin:10px;
text-shadow:0 0 10px rgba(0,0,0,0.7);
}

.hero p {
text-shadow:0 0 10px rgba(0,0,0,0.7);
}

/* SECTION */
.section {
padding:70px 20px;
text-align:center;
}

h2 {
margin-bottom:30px;
}

/* SERVICES */
.services {
display:flex;
flex-wrap:wrap;
justify-content:center;
}

.card {
background:white;
margin:15px;
padding:25px;
width:220px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
transition:0.3s;
}

.card:hover {
transform:translateY(-10px);
}

.card i {
font-size:40px;
color:#0b3d91;
margin-bottom:10px;
}

/* GALLERY */
.gallery {
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:20px;
}

.gallery img {
width:100%;
height:220px;
object-fit:cover;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
transition:0.3s;
}

.gallery img:hover {
transform:scale(1.05);
}

/* FORM */
input, select, textarea {
width:90%;
padding:12px;
margin:10px;
border-radius:6px;
border:1px solid #ccc;
}

button {
background:#0b3d91;
color:white;
padding:12px;
border:none;
width:220px;
cursor:pointer;
border-radius:5px;
}

/* WHATSAPP */
.whatsapp {
position:fixed;
bottom:20px;
left:20px;
background:#25D366;
color:white;
padding:15px;
border-radius:50%;
text-decoration:none;
font-size:20px;
}

/* FOOTER */
footer {
background:#222;
color:white;
text-align:center;
padding:20px;
}
</style>
</head>

<body>

<header>
<h2>Portiva</h2>
<nav>
<a href="#home">الرئيسية</a>
<a href="#services">الخدمات</a>
<a href="#gallery">أعمالنا</a>
<a href="#quote">عرض سعر</a>
</nav>
</header>

<!-- HERO -->
<section class="hero" id="home">
<img src="logo.png.png">
<h1>Portiva Logistics</h1>
<p>التخليص الجمركي والنقل من جميع الموانئ</p>
</section>

<!-- SERVICES -->
<section class="section" id="services">
<h2>خدماتنا</h2>

<div class="services">

<div class="card">
<i class="fa-solid fa-ship"></i>
<h3>التخليص الجمركي</h3>
</div>

<div class="card">
<i class="fa-solid fa-truck"></i>
<h3>نقل الحاويات</h3>
</div>

<div class="card">
<i class="fa-solid fa-warehouse"></i>
<h3>خدمات الميناء</h3>
</div>

<div class="card">
<i class="fa-solid fa-box"></i>
<h3>إدارة الشحنات</h3>
</div>

</div>
</section>

<!-- GALLERY -->
<section class="section" id="gallery">
<h2>أعمالنا من أرض الواقع</h2>

<div class="gallery">
<img src="img1.jpg">
<img src="img2.jpg">
<img src="img3.jpg">
<img src="img4.jpg">
<img src="img5.jpg">
<img src="img6.jpg">
<img src="img7.jpg">
</div>

</section>

<!-- QUOTE -->
<section class="section" id="quote">
<h2>طلب عرض سعر</h2>

<input id="name" placeholder="الاسم">
<input id="phone" placeholder="رقم الهاتف">

<select id="container">
<option>نوع الحاوية</option>
<option>20 قدم</option>
<option>40 قدم</option>
</select>

<input id="count" placeholder="عدد الحاويات">

<textarea id="details" placeholder="تفاصيل"></textarea>

<button onclick="send()">إرسال واتساب</button>
</section>

<a class="whatsapp" href="https://wa.me/201204646350">💬</a>

<footer>
© 2026 Portiva Logistics
</footer>

<script>
function send(){
let name = document.getElementById("name").value;
let phone = document.getElementById("phone").value;
let container = document.getElementById("container").value;
let count = document.getElementById("count").value;
let details = document.getElementById("details").value;

let msg = `طلب تخليص:
الاسم: ${name}
رقم الهاتف: ${phone}
نوع الحاوية: ${container}
عدد الحاويات: ${count}
تفاصيل: ${details}`;

window.open("https://wa.me/201204646350?text=" + encodeURIComponent(msg));
}
</script>

</body>
</html>
